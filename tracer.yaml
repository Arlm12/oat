# OpenAgentTrace Configuration
# This file defines auto-instrumentation rules for your agent

# Service identification
service:
  name: my-agent
  version: "1.0.0"
  environment: development

# Export configuration
export:
  # Local storage (always enabled)
  local:
    enabled: true
    data_dir: .oat
  
  # HTTP export to OAT server
  http:
    enabled: true
    endpoint: http://localhost:8787
    batch_size: 10
    flush_interval_ms: 1000

# Auto-instrumentation targets
# These functions will be automatically traced without decorators
targets:
  # LLM calls
  - module: openai.resources.chat.completions
    function: create
    span_type: llm
    capture_input: true
    capture_output: true
  
  # Database queries  
  - module: my_agent.database
    function: query
    span_type: tool
    name: db_query
    
  # Vector search
  - module: my_agent.retriever
    function: search
    span_type: retrieval
    meta:
      collection: documents

# Sampling configuration
sampling:
  # Sample rate (0.0 - 1.0)
  rate: 1.0
  
  # Always sample errors
  sample_errors: true
  
  # Always sample slow traces (ms)
  slow_threshold_ms: 5000

# Cost tracking (per 1K tokens)
#
# Treat this as your app's source of truth for cost estimation. Provider
# catalogs and prices change independently of the SDK, so it is safer to keep
# overrides here than to wait for a package release.
cost_config:
  models:
    gpt-5:
      input: 0.00125
      output: 0.01
    gpt-5-mini:
      input: 0.00025
      output: 0.002
    gpt-4o-mini:
      input: 0.00015
      output: 0.0006
    claude-sonnet-4-5:
      input: 0.003
      output: 0.015
    claude-opus-4-1:
      input: 0.015
      output: 0.075
    gemini-2.5-pro:
      input: 0.00125
      output: 0.01
    gemini-2.5-flash:
      input: 0.0003
      output: 0.0025
